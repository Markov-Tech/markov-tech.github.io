<!DOCTYPE html>

<head>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        /* New styling for the logo image */
        .logo-image {
            display: block; /* Ensures proper spacing */
            margin-left: auto;
            margin-right: auto;
            width: 100%; /* Make it responsive */
            max-width: 400px; /* Adjust this to scale the logo (closer to the original 4rem text size weight) */
            height: auto; /* Maintain aspect ratio */
            margin-bottom: 5px; /* Replicate original h1 spacing */
        }
        /* The old h1 is gone, so these specific styles are no longer needed, but kept here for reference if you change your mind */
        /* h1 {
            color: #ffffff;
            font-size: 4rem; 
            letter-spacing: 4px;
            margin-bottom: 5px;
        } */
        h2 {
            color: #8b949e;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #6e7681;
            margin-bottom: 45px;
        }
        .coming-soon {
            display: inline-block;
            padding: 6px 16px;
            border: 1px solid #3fb950;
            color: #3fb950;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .btn {
            background-color: #f0f6fc;
            color: #0d1117;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1.05rem;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #c9d1d9;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- Replaced text with the logo image -->
