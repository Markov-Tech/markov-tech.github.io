<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markov | Coming Soon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            color: #ffffff;
            font-size: 4rem; /* Un poco más grande para darle peso a la marca */
            letter-spacing: 4px;
            margin-bottom: 5px;
        }
        h2 {
            color: #8b949e;
            font-size: 1.5rem;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #6e7681;
            margin-bottom: 45px;
        }
        .coming-soon {
            display: inline-block;
            padding: 6px 16px;
            border: 1px solid #3fb950;
            color: #3fb950;
            border-radius: 20px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .btn {
            background-color: #f0f6fc; /* Botón blanco para un look más moderno y premium */
            color: #0d1117;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 30px; /* Bordes más redondeados */
            font-weight: bold;
            font-size: 1.05rem;
            transition: all 0.2s ease;
        }
        .btn:hover {
            background-color: #c9d1d9;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="coming-soon">Coming Soon</div>
        <h1>MARKOV</h1>
        <h2>Engineering the future.</h2>
        <p>We are developing next-generation technology<br>to solve tomorrow's challenges.</p>
        
        <!-- Cambia este correo por el tuyo -->
        <a href="mailto:carlosfmoreno13@gmail.com?subject=Early%20Access%20Request" class="btn">Join the waitlist</a>
    </div>
</body>
</html>
